# ============================================================================
# AI Conversations Right Sidebar — settings
# Site-wide policy for the AI Memories panel. Per-user state (memory
# enabled/disabled, last panel-open) lives in localStorage, not here.
# ============================================================================

ai_conv_right_sidebar_enabled:
  type: bool
  default: true
  client: true
  description: "Master switch for the AI Memories right sidebar and its chevron. When off, the component injects nothing."

ai_conv_memory_panel_default_open:
  type: bool
  default: false
  client: true
  description: "Whether the AI Memories panel starts open the first time a user lands on the page. A per-user localStorage preference, once set, overrides this default."
